spring.application.name=budget-tracker

# ==========================================
# MySQL Database Configuration
# ==========================================
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/budget_tracker?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# ==========================================
# JPA / Hibernate Configuration
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# JWT Configuration
# ==========================================
# Secret key must be at least 256-bit (32 chars) for HS256. Change this in production!
app.jwt.secret=3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b
app.jwt.expiration-ms=86400000

# ==========================================
# Logging
# ==========================================
logging.level.org.springframework.security=DEBUG
logging.level.com.finance=DEBUG
