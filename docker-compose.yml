version: '3.8'

services:
  db:
    image: mysql:8
    container_name: budget_tracker_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword # Change this in production
      MYSQL_DATABASE: budget_tracker
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: budget_tracker_backend
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/budget_tracker?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpassword
    ports:
      - "8080:8080"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: budget_tracker_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
